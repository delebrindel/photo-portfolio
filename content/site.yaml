about:
  bio: |
    I see photography as a way of translating emotion into light, shadow, and color. My work moves between Reality and imagination.  sometimes raw and natural, other times surreal and atmospheric. Each image is a fragment of a story, shaped by mood, silence, and the spaces in between.

    I’m drawn to contrasts: vibrant stage lights, quiet portraits, and darker tones that hint at mystery. For me, the camera is less about documenting and more about revealing the unseen. I want my photos to evoke feelings and invite viewers to find their own stories within the frame. Through my lens, I aim to capture the beauty of imperfection and the magic of fleeting moments.

